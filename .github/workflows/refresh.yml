name: Refresh fixtures

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-fixtures
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch fixturedownload feed
        run: |
          mkdir -p data
          curl --fail --silent --show-error \
            -H "User-Agent: vm-tipset-refresh" \
            "https://fixturedownload.com/feed/json/fifa-world-cup-2026" \
            -o /tmp/feed.json
          test -s /tmp/feed.json
          jq -n \
            --arg fetchedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg source "https://fixturedownload.com/feed/json/fifa-world-cup-2026" \
            --slurpfile m /tmp/feed.json \
            '{fetchedAt: $fetchedAt, source: $source, matches: $m[0]}' \
            > data/fixtures.json

      - name: Fetch ESPN teams (logos)
        run: |
          curl --fail --silent --show-error \
            -H "User-Agent: vm-tipset-refresh" \
            "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/teams" \
            -o /tmp/teams.json
          test -s /tmp/teams.json
          jq -n \
            --arg fetchedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile t /tmp/teams.json \
            '{
              fetchedAt: $fetchedAt,
              teams: ($t[0].sports[0].leagues[0].teams | map({
                key: .team.displayName,
                value: {
                  abbr: .team.abbreviation,
                  id: .team.id,
                  logo: ([.team.logos[] | select((.rel // []) | (contains(["full"]) and (contains(["dark"]) | not)))][0].href // .team.logo)
                }
              }) | from_entries)
            }' \
            > data/teams.json

      - name: Commit if changed
        run: |
          git config user.name  "vm-tipset-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/fixtures.json data/teams.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
