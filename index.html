<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VM Tipset 2026</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0b1220" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="VM Tipset" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <h1>VM&nbsp;Tipset <span class="topbar-year">2026</span></h1>
    <span id="updated" class="sync-pill">…</span>
  </div>
</header>

<main id="view-home" class="view">
  <section id="titlerace" class="block"></section>
  <section id="hero" class="hero"></section>
  <section class="block">
    <div class="section-head">
      <h2>Ställning</h2>
      <span class="section-sub">Slutställning gruppspel</span>
    </div>
    <div id="podium" class="podium"></div>
    <ol id="scoreboard"></ol>
    <p class="hint">1p per rätt 1X2 · 2p bonus för rätt VM-vinnare · tryck på en spelare för analys</p>
  </section>
  <section id="pulse" class="pulse-wrap"></section>

  <details class="block hist-wrap">
    <summary class="hist-summary"><span class="col-title">Gruppspelets matcher</span><span class="col-chevron">▾</span></summary>
    <div class="filters">
      <button class="filter active" data-filter="all">Alla</button>
      <button class="filter" data-filter="played">Spelade</button>
    </div>
    <div id="matches"></div>
  </details>
</main>

<main id="view-sweden" class="view" hidden>
  <section class="block">
    <h2 class="view-title">Sverige</h2>
    <div id="sweden"></div>
  </section>
</main>

<main id="view-highlights" class="view" hidden>
  <section class="block">
    <h2 class="view-title">Höjdpunkter</h2>
    <div id="highlights"></div>
  </section>
</main>

<main id="view-groups" class="view" hidden>
  <section class="block">
    <h2 class="view-title">Gruppspel</h2>
    <div id="groups"></div>
  </section>
</main>

<main id="view-knockout" class="view" hidden>
  <section class="block">
    <h2 class="view-title">Slutspel</h2>
    <div id="knockout"></div>
  </section>
</main>

<nav class="bottomnav">
  <button class="navbtn active" data-tab="home" aria-label="Hem">
    <svg viewBox="0 0 24 24" class="navicon"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9h5v-5h4v5h5v-9"/></svg>
    <span>Hem</span>
  </button>
  <button class="navbtn" data-tab="knockout" aria-label="Slutspel">
    <svg viewBox="0 0 24 24" class="navicon"><path d="M6 4h12v3a6 6 0 0 1-12 0z"/><path d="M6 5H3.5v1.5A3 3 0 0 0 6 9M18 5h2.5v1.5A3 3 0 0 1 18 9"/><path d="M12 13v4M9 20h6M10 17h4"/></svg>
    <span>Slutspel</span>
  </button>
  <button class="navbtn" data-tab="sweden" aria-label="Sverige">
    <svg viewBox="0 0 24 24" class="navicon"><circle cx="12" cy="12" r="8.5"/><path d="M3.5 12h17M12 3.5v17"/></svg>
    <span>Sverige</span>
  </button>
  <button class="navbtn" data-tab="highlights" aria-label="Höjdpunkter">
    <svg viewBox="0 0 24 24" class="navicon"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="m10 9 5 3-5 3z" fill="currentColor" stroke="none"/></svg>
    <span>Klipp</span>
  </button>
  <button class="navbtn" data-tab="groups" aria-label="Grupper">
    <svg viewBox="0 0 24 24" class="navicon"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg>
    <span>Grupper</span>
  </button>
</nav>

<dialog id="detail" aria-label="Matchdetaljer">
  <div id="detail-body"><p class="detail-loading">Laddar…</p></div>
</dialog>

<dialog id="player" aria-label="Spelardetaljer">
  <div id="player-body"></div>
</dialog>

<script src="app.js" defer></script>
</body>
</html>
